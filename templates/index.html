<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT Plus 활성화</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e4e4e7;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.5rem;
      text-align: center;
    }
    label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.9rem;
      color: #a1a1aa;
    }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(0,0,0,0.2);
      color: #fff;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    input::placeholder { color: #71717a; }
    input:focus {
      outline: none;
      border-color: #8b5cf6;
    }
    button {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button:hover { opacity: 0.95; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
      white-space: pre-wrap;
    }
    .message.show { display: block; }
    .message.error { background: rgba(239,68,68,0.2); color: #fca5a5; border: 1px solid rgba(239,68,68,0.4); }
    .message.success { background: rgba(34,197,94,0.2); color: #86efac; border: 1px solid rgba(34,197,94,0.4); }
  </style>
</head>
<body>
  <div class="card">
    <h1>GPT Plus 활성화</h1>
    <form id="activateForm">
      <label for="email">이메일</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required>
      <label for="code">활성화 코드</label>
      <input type="text" id="code" name="code" placeholder="Activation code" required>
      <button type="submit" id="btnSubmit">GPT Plus 활성화</button>
    </form>
    <div id="message" class="message"></div>
  </div>
  <script>
    const form = document.getElementById('activateForm');
    const messageEl = document.getElementById('message');
    const btnSubmit = document.getElementById('btnSubmit');

    function showMessage(text, isError) {
      messageEl.textContent = text;
      messageEl.className = 'message show ' + (isError ? 'error' : 'success');
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const code = document.getElementById('code').value.trim();
      if (!email || !code) {
        showMessage('이메일과 활성화 코드를 입력해 주세요.', true);
        return;
      }
      btnSubmit.disabled = true;
      showMessage('처리 중...', false);
      try {
        const res = await fetch('/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code })
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.success) {
          showMessage(`완료되었습니다.\nactivatedAt: ${data.activatedAt || ''}`, false);
          form.reset();
        } else {
          showMessage(data.error || ('오류: ' + res.status), true);
        }
      } catch (err) {
        showMessage('네트워크 오류. 다시 시도해 주세요.', true);
      }
      btnSubmit.disabled = false;
    });
  </script>
</body>
</html>
