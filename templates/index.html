<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT Plus 활성화</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .lang-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .lang-toggle:focus {
      outline: 2px solid rgba(255, 255, 255, 0.55);
      outline-offset: 2px;
    }
    .lang-toggle .globe {
      width: 18px;
      height: 18px;
      display: inline-block;
      flex: 0 0 auto;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.8rem;
      text-align: center;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    h1 .icon {
      font-size: 1.8rem;
    }
    .input-wrapper {
      position: relative;
      margin-bottom: 1.5rem;
    }
    .input-wrapper .icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: #999;
      pointer-events: none;
    }
    .input-wrapper input {
      padding-left: 3rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
      color: #555;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    label .icon {
      font-size: 1rem;
    }
    input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      color: #333;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .message {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
      white-space: pre-wrap;
    }
    .message.show { display: block; }
    .message.error {
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }
    .message.success {
      background: #efe;
      color: #3c3;
      border: 1px solid #cfc;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      line-height: 1.6;
    }
    .message.success .icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }
    .message.error {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .message.error .icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }
    .message-content {
      flex: 1;
    }
  </style>
</head>
<body>
  <button type="button" class="lang-toggle" id="langToggle" aria-label="Change language">
    <span class="globe" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="1.8"/>
        <path d="M2 12H22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M12 2C14.8 4.7 16.4 8.2 16.4 12C16.4 15.8 14.8 19.3 12 22C9.2 19.3 7.6 15.8 7.6 12C7.6 8.2 9.2 4.7 12 2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
    </span>
    <span id="langLabel">VI</span>
  </button>
  <div class="card">
    <h1><span class="icon"></span> <span id="titleText">GPT Plus 활성화</span></h1>
    <form id="addMemberForm">
      <label for="code"><span class="icon">🔑</span> <span id="labelCode">활성화 코드</span></label>
      <div class="input-wrapper">
        <span class="icon">🔐</span>
        <input type="text" id="code" name="code" placeholder="활성화 코드를 입력하세요" required>
      </div>
      <label for="email"><span class="icon">📧</span> <span id="labelEmail">이메일</span></label>
      <div class="input-wrapper">
        <span class="icon">✉️</span>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>
      </div>
      <button type="submit" id="btnSubmit">
        <span class="icon">➕</span>
        <span id="btnText">멤버 추가</span>
      </button>
    </form>
    <div id="message" class="message">
      <span class="icon"></span>
      <span class="message-content"></span>
    </div>
  </div>
  <script>
    const form = document.getElementById('addMemberForm');
    const messageEl = document.getElementById('message');
    const btnSubmit = document.getElementById('btnSubmit');
    const langToggle = document.getElementById('langToggle');
    const langLabel = document.getElementById('langLabel');

    const i18n = {
      ko: {
        htmlLang: 'ko',
        pageTitle: 'GPT Plus 활성화',
        titleText: 'GPT Plus 활성화',
        labelCode: '활성화 코드',
        placeholderCode: '활성화 코드를 입력하세요',
        labelEmail: '이메일',
        placeholderEmail: 'example@email.com',
        btnText: '멤버 추가',
        errNeedCode: '활성화 코드를 입력해주세요.',
        errNeedEmail: '이메일을 입력해주세요.',
        processing: '처리 중...',
        success: '초대장을 지피티 이메일로 발송해 드렸습니다.\n이메일함 확인 후 수락해 주시면 바로 이용 가능합니다.\n저희 구독핀 이용해주셔서 감사합니다!',
        networkError: '연결 오류. 다시 시도해주세요.',
        errStatusPrefix: '오류',
      },
      vi: {
        htmlLang: 'vi',
        pageTitle: 'Kích hoạt GPT Plus',
        titleText: 'Kích hoạt GPT Plus',
        labelCode: 'Mã kích hoạt',
        placeholderCode: 'Nhập mã kích hoạt',
        labelEmail: 'Email',
        placeholderEmail: 'example@email.com',
        btnText: 'Thêm thành viên',
        errNeedCode: 'Vui lòng nhập mã kích hoạt.',
        errNeedEmail: 'Vui lòng nhập email.',
        processing: 'Đang xử lý...',
        success: 'Mình đã gửi thư mời vào email GPT của bạn.\nVui lòng kiểm tra hộp thư và chấp nhận để sử dụng ngay.\nCảm ơn bạn đã sử dụng dịch vụ!',
        networkError: 'Lỗi kết nối. Vui lòng thử lại.',
        errStatusPrefix: 'Lỗi',
      }
    };

    function getLang() {
      const saved = (localStorage.getItem('lang') || '').toLowerCase();
      return saved === 'vi' ? 'vi' : 'ko'; // default KO
    }

    function setLang(lang) {
      const l = lang === 'vi' ? 'vi' : 'ko';
      localStorage.setItem('lang', l);

      const t = i18n[l];
      document.documentElement.lang = t.htmlLang;
      document.title = t.pageTitle;

      document.getElementById('titleText').textContent = t.titleText;
      document.getElementById('labelCode').textContent = t.labelCode;
      document.getElementById('labelEmail').textContent = t.labelEmail;
      document.getElementById('btnText').textContent = t.btnText;

      document.getElementById('code').setAttribute('placeholder', t.placeholderCode);
      document.getElementById('email').setAttribute('placeholder', t.placeholderEmail);

      // button shows the language you can switch TO (like your screenshot "VI")
      langLabel.textContent = l === 'ko' ? 'VI' : 'KO';
      langToggle.setAttribute('aria-label', l === 'ko' ? 'Change language to Vietnamese' : 'Change language to Korean');
    }

    langToggle.addEventListener('click', () => {
      const current = getLang();
      setLang(current === 'ko' ? 'vi' : 'ko');
    });

    // init
    setLang(getLang());

    function showMessage(text, isError) {
      const iconEl = messageEl.querySelector('.icon');
      const contentEl = messageEl.querySelector('.message-content');
      
      if (isError) {
        iconEl.textContent = '❌';
      } else {
        iconEl.textContent = '✅';
      }
      
      contentEl.textContent = text;
      messageEl.className = 'message show ' + (isError ? 'error' : 'success');
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const code = document.getElementById('code').value.trim();
      const email = document.getElementById('email').value.trim();
      const t = i18n[getLang()];
      
      if (!code) {
        showMessage(t.errNeedCode, true);
        return;
      }
      
      if (!email) {
        showMessage(t.errNeedEmail, true);
        return;
      }
      
      btnSubmit.disabled = true;
      const iconEl = messageEl.querySelector('.icon');
      const contentEl = messageEl.querySelector('.message-content');
      iconEl.textContent = '⏳';
      contentEl.textContent = t.processing;
      messageEl.className = 'message show success';
      
      try {
        const res = await fetch('/add-member', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, email })
        });
        
        const data = await res.json().catch(() => ({}));
        
        if (res.ok && data.success) {
          showMessage(t.success, false);
          form.reset();
        } else {
          showMessage(data.error || (t.errStatusPrefix + ': ' + res.status), true);
        }
      } catch (err) {
        showMessage(t.networkError, true);
      }
      
      btnSubmit.disabled = false;
    });
  </script>
</body>
</html>
