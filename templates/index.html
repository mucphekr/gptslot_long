<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>멤버 추가</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.8rem;
      text-align: center;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    h1 .icon {
      font-size: 1.8rem;
    }
    .input-wrapper {
      position: relative;
      margin-bottom: 1.5rem;
    }
    .input-wrapper .icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: #999;
      pointer-events: none;
    }
    .input-wrapper input {
      padding-left: 3rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
      color: #555;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    label .icon {
      font-size: 1rem;
    }
    input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      color: #333;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .message {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
      white-space: pre-wrap;
    }
    .message.show { display: block; }
    .message.error {
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }
    .message.success {
      background: #efe;
      color: #3c3;
      border: 1px solid #cfc;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      line-height: 1.6;
    }
    .message.success .icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }
    .message.error {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .message.error .icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }
    .message-content {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="icon">👥</span> 멤버 추가</h1>
    <form id="addMemberForm">
      <label for="code"><span class="icon">🔑</span> 활성화 코드</label>
      <div class="input-wrapper">
        <span class="icon">🔐</span>
        <input type="text" id="code" name="code" placeholder="활성화 코드를 입력하세요" required>
      </div>
      <label for="email"><span class="icon">📧</span> 이메일</label>
      <div class="input-wrapper">
        <span class="icon">✉️</span>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>
      </div>
      <button type="submit" id="btnSubmit">
        <span class="icon">➕</span>
        <span>멤버 추가</span>
      </button>
    </form>
    <div id="message" class="message">
      <span class="icon"></span>
      <span class="message-content"></span>
    </div>
  </div>
  <script>
    const form = document.getElementById('addMemberForm');
    const messageEl = document.getElementById('message');
    const btnSubmit = document.getElementById('btnSubmit');

    function showMessage(text, isError) {
      const iconEl = messageEl.querySelector('.icon');
      const contentEl = messageEl.querySelector('.message-content');
      
      if (isError) {
        iconEl.textContent = '❌';
      } else {
        iconEl.textContent = '✅';
      }
      
      contentEl.textContent = text;
      messageEl.className = 'message show ' + (isError ? 'error' : 'success');
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const code = document.getElementById('code').value.trim();
      const email = document.getElementById('email').value.trim();
      
      if (!code) {
        showMessage('활성화 코드를 입력해주세요.', true);
        return;
      }
      
      if (!email) {
        showMessage('이메일을 입력해주세요.', true);
        return;
      }
      
      btnSubmit.disabled = true;
      const iconEl = messageEl.querySelector('.icon');
      const contentEl = messageEl.querySelector('.message-content');
      iconEl.textContent = '⏳';
      contentEl.textContent = '처리 중...';
      messageEl.className = 'message show success';
      
      try {
        const res = await fetch('/add-member', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, email })
        });
        
        const data = await res.json().catch(() => ({}));
        
        if (res.ok && data.success) {
          showMessage('초대장을 지피티 이메일로 발송해 드렸습니다.\n이메일함 확인 후 수락해 주시면 바로 이용 가능합니다.\n저희 구독핀 이용해주셔서 감사합니다!', false);
          form.reset();
        } else {
          showMessage(data.error || ('오류: ' + res.status), true);
        }
      } catch (err) {
        showMessage('연결 오류. 다시 시도해주세요.', true);
      }
      
      btnSubmit.disabled = false;
    });
  </script>
</body>
</html>
